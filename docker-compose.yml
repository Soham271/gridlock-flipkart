services:
  sidecar:
    build: ./ml_sidecar
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SIDECAR_URL=http://sidecar:8001
      - PORT=8080
    depends_on:
      sidecar:
        condition: service_healthy
